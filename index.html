  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2,200,0.65), 0 0 28px rgba(92,242,200,0.35);\">SNAKE<\u002Fh1>\n    <p style=\"margin: 0; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #7c86b8;\">Eat · Grow · Survive<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;\">\n    <div style=\"background: rgba(92,242,200,0.07); border: 1px solid rgba(92,242,200,0.3); border-radius: 12px; padding: 10px 22px; min-width: 110px; text-align: center;\">\n      <div style=\"font-size: 11px; letter-spacing: 2px; color: #7c86b8; text-transform: uppercase;\">Score<\u002Fdiv>\n      <div style=\"font-family: 'Press Start 2P', monospace; font-size: 22px; color: #5cf2c8; margin-top: 6px;\">{{ score }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background: rgba(255,180,90,0.07); border: 1px solid rgba(255,180,90,0.3); border-radius: 12px; padding: 10px 22px; min-width: 110px; text-align: center;\">\n      <div style=\"font-size: 11px; letter-spacing: 2px; color: #7c86b8; text-transform: uppercase;\">Best<\u002Fdiv>\n      <div style=\"font-family: 'Press Start 2P', monospace; font-size: 22px; color: #ffb45a; margin-top: 6px;\">{{ best }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position: relative;\">\n    <canvas ref=\"{{ canvasRef }}\" width=\"420\" height=\"420\" style=\"display: block; border-radius: 16px; background: linear-gradient(135deg, #0d1430, #0a0f24); box-shadow: 0 0 0 1px rgba(92,242,200,0.25), 0 0 40px rgba(92,242,200,0.12), inset 0 0 60px rgba(0,0,0,0.5); max-width: 88vw; max-height: 88vw; touch-action: none;\"><\u002Fcanvas>\n\n    <sc-if value=\"{{ showOverlay }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; background: rgba(5,6,13,0.78); backdrop-filter: blur(3px); border-radius: 16px; padding: 24px; text-align: center;\">\n        <div style=\"font-family: 'Press Start 2P', monospace; font-size: clamp(15px, 3.4vw, 22px); color: {{ overlayColor }}; text-shadow: 0 0 16px currentColor; line-height: 1.5; animation: floatup 0.35s ease both;\">{{ overlayTitle }}<\u002Fdiv>\n        <div style=\"font-size: 13px; color: #aab2dd; max-width: 260px; line-height: 1.6;\">{{ overlaySub }}<\u002Fdiv>\n        <button onclick=\"{{ start }}\" style=\"cursor: pointer; font-family: 'Russo One', sans-serif; font-size: 15px; letter-spacing: 1px; color: #05060d; background: linear-gradient(135deg, #5cf2c8, #34d3a6); border: none; border-radius: 10px; padding: 13px 30px; box-shadow: 0 0 22px rgba(92,242,200,0.5); animation: glowpulse 2s ease-in-out infinite;\">{{ buttonLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <div style=\"display: flex; flex-direction: column; align-items: center; gap: 14px;\">\n    <div style=\"display: flex; gap: 8px; align-items: center;\">\n      <span style=\"font-size: 11px; letter-spacing: 2px; color: #7c86b8; text-transform: uppercase; margin-right: 4px;\">Speed<\u002Fspan>\n      <sc-for list=\"{{ levels }}\" as=\"lvl\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ lvl.select }}\" style=\"{{ lvl.style }}\">{{ lvl.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"font-size: 12px; color: #5b6391; letter-spacing: 0.5px; text-align: center; line-height: 1.7;\">{{ controlsHint }}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- On-screen D-pad for touch -->\n  <div style=\"display: grid; grid-template-columns: repeat(3, 56px); grid-template-rows: repeat(3, 56px); gap: 8px; margin-top: 4px;\">\n    <span><\u002Fspan>\n    <button onclick=\"{{ pressUp }}\" style=\"{{ padStyle }}\">▲<\u002Fbutton>\n    <span><\u002Fspan>\n    <button onclick=\"{{ pressLeft }}\" style=\"{{ padStyle }}\">◀<\u002Fbutton>\n    <span><\u002Fspan>\n    <button onclick=\"{{ pressRight }}\" style=\"{{ padStyle }}\">▶<\u002Fbutton>\n    <span><\u002Fspan>\n    <button onclick=\"{{ pressDown }}\" style=\"{{ padStyle }}\">▼<\u002Fbutton>\n    <span><\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:880}}\">\nclass Component extends DCLogic {\n  state = {\n    score: 0,\n    best: 0,\n    status: 'ready', // ready | playing | over\n    level: 'normal',\n  };\n\n  GRID = 21;        // cells per side\n  CELL = 20;        // px per cell (canvas 420 = 21*20)\n  SPEEDS = { calm: 150, normal: 100, fast: 65 };\n\n  componentDidMount() {\n    try {\n      const b = parseInt(localStorage.getItem('snake_best') || '0', 10);\n      if (!isNaN(b)) this.setState({ best: b });\n    } catch (e) {}\n    this.resetBoard();\n    this.draw();\n    this._keyHandler = (e) => this.handleKey(e);\n    window.addEventListener('keydown', this._keyHandler);\n    this.attachSwipe();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('keydown', this._keyHandler);\n    if (this._timer) clearInterval(this._timer);\n  }\n\n  setCanvas = (el) => {\n    this.canvas = el;\n    if (el) { this.ctx = el.getContext('2d'); this.draw(); this.attachSwipe(); }\n  };\n\n  attachSwipe() {\n    if (!this.canvas || this._swipeAttached) return;\n    this._swipeAttached = true;\n    let sx = 0, sy = 0;\n    this.canvas.addEventListener('touchstart', (e) => {\n      sx = e.touches[0].clientX; sy = e.touches[0].clientY;\n    }, { passive: true });\n    this.canvas.addEventListener('touchmove', (e) => {\n      if (this.state.status !== 'playing') return;\n      e.preventDefault();\n    }, { passive: false });\n    this.canvas.addEventListener('touchend', (e) => {\n      const t = e.changedTouches[0];\n      const dx = t.clientX - sx, dy = t.clientY - sy;\n      if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;\n      if (Math.abs(dx) > Math.abs(dy)) this.setDir(dx > 0 ? [1,0] : [-1,0]);\n      else this.setDir(dy > 0 ? [0,1] : [0,-1]);\n    }, { passive: true });\n  }\n\n  resetBoard() {\n    const c = Math.floor(this.GRID / 2);\n    this.snake = [[c, c], [c - 1, c], [c - 2, c]];\n    this.dir = [1, 0];\n    this.nextDir = [1, 0];\n    this.placeFood();\n  }\n\n  placeFood() {\n    let p;\n    do {\n      p = [Math.floor(Math.random() * this.GRID), Math.floor(Math.random() * this.GRID)];\n    } while (this.snake.some(s => s[0] === p[0] && s[1] === p[1]));\n    this.food = p;\n  }\n\n  start = () => {\n    this.resetBoard();\n    this.setState({ score: 0, status: 'playing' });\n    if (this._timer) clearInterval(this._timer);\n    this._timer = setInterval(() => this.tick(), this.SPEEDS[this.state.level]);\n    this.draw();\n  };\n\n  tick() {\n    if (this.state.status !== 'playing') return;\n    this.dir = this.nextDir;\n    const head = [this.snake[0][0] + this.dir[0], this.snake[0][1] + this.dir[1]];\n    // wall collision\n    if (head[0] < 0 || head[1] < 0 || head[0] >= this.GRID || head[1] >= this.GRID) return this.gameOver();\n    // self collision\n    if (this.snake.some(s => s[0] === head[0] && s[1] === head[1])) return this.gameOver();\n    this.snake.unshift(head);\n    if (head[0] === this.food[0] && head[1] === this.food[1]) {\n      const score = this.state.score + 10;\n      this.setState({ score });\n      this.placeFood();\n    } else {\n      this.snake.pop();\n    }\n    this.draw();\n  }\n\n  gameOver() {\n    clearInterval(this._timer);\n    const { score, best } = this.state;\n    let newBest = best;\n    if (score > best) {\n      newBest = score;\n      try { localStorage.setItem('snake_best', String(score)); } catch (e) {}\n    }\n    this.setState({ status: 'over', best: newBest });\n    this.draw();\n  }\n\n  setDir(d) {\n    if (this.state.status !== 'playing') return;\n    // prevent 180° reversal\n    if (d[0] === -this.dir[0] && d[1] === -this.dir[1]) return;\n    this.nextDir = d;\n  }\n\n  handleKey(e) {\n    const map = { ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],\n                  w: [0,-1], s: [0,1], a: [-1,0], d: [1,0], W:[0,-1], S:[0,1], A:[-1,0], D:[1,0] };\n    if (map[e.key]) { e.preventDefault(); this.setDir(map[e.key]); }\n    if (e.key === ' ' && this.state.status !== 'playing') { e.preventDefault(); this.start(); }\n  }\n\n  draw() {\n    if (!this.ctx) return;\n    const ctx = this.ctx, CELL = this.CELL, N = this.GRID;\n    ctx.clearRect(0, 0, N * CELL, N * CELL);\n    // subtle grid\n    ctx.strokeStyle = 'rgba(92,242,200,0.05)';\n    ctx.lineWidth = 1;\n    for (let i = 1; i < N; i++) {\n      ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, N * CELL); ctx.stroke();\n      ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(N * CELL, i * CELL); ctx.stroke();\n    }\n    if (this.food) {\n      const [fx, fy] = this.food;\n      ctx.fillStyle = '#ffb45a';\n      ctx.shadowColor = '#ffb45a'; ctx.shadowBlur = 16;\n      this.roundRect(ctx, fx * CELL + 4, fy * CELL + 4, CELL - 8, CELL - 8, 5);\n      ctx.fill();\n      ctx.shadowBlur = 0;\n    }\n    if (this.snake) {\n      this.snake.forEach((seg, i) => {\n        const t = i / Math.max(this.snake.length - 1, 1);\n        const g = Math.round(242 - t * 80);\n        ctx.fillStyle = i === 0 ? '#7dffd9' : `rgb(${52 + t*10}, ${g}, ${168 - t*30})`;\n        ctx.shadowColor = '#5cf2c8'; ctx.shadowBlur = i === 0 ? 14 : 6;\n        this.roundRect(ctx, seg[0] * CELL + 2, seg[1] * CELL + 2, CELL - 4, CELL - 4, 6);\n        ctx.fill();\n      });\n      ctx.shadowBlur = 0;\n    }\n  }\n\n  roundRect(ctx, x, y, w, h, r) {\n    ctx.beginPath();\n    ctx.moveTo(x + r, y);\n    ctx.arcTo(x + w, y, x + w, y + h, r);\n    ctx.arcTo(x + w, y + h, x, y + h, r);\n    ctx.arcTo(x, y + h, x, y, r);\n    ctx.arcTo(x, y, x + w, y, r);\n    ctx.closePath();\n  }\n\n  selectLevel(key) {\n    this.setState({ level: key });\n    if (this.state.status === 'playing') {\n      clearInterval(this._timer);\n      this._timer = setInterval(() => this.tick(), this.SPEEDS[key]);\n    }\n  }\n\n  renderVals() {\n    const { score, best, status, level } = this.state;\n    const padStyle = \"cursor: pointer; font-size: 20px; color: #5cf2c8; background: rgba(92,242,200,0.08); border: 1px solid rgba(92,242,200,0.28); border-radius: 12px; display: flex; align-items: center; justify-content: center; touch-action: manipulation;\";\n\n    const lvlBase = \"cursor: pointer; font-family: 'Russo One', sans-serif; font-size: 13px; letter-spacing: 1px; padding: 8px 16px; border-radius: 8px; text-transform: uppercase;\";\n    const levels = [\n      { key: 'calm', label: 'Calm' },\n      { key: 'normal', label: 'Normal' },\n      { key: 'fast', label: 'Fast' },\n    ].map(l => ({\n      label: l.label,\n      select: () => this.selectLevel(l.key),\n      style: lvlBase + (level === l.key\n        ? \"background: linear-gradient(135deg,#5cf2c8,#34d3a6); color:#05060d; border:1px solid transparent; box-shadow:0 0 14px rgba(92,242,200,0.4);\"\n        : \"background: rgba(255,255,255,0.04); color:#9aa3d0; border:1px solid rgba(255,255,255,0.1);\"),\n    }));\n\n    const overlays = {\n      ready: { title: 'READY?', sub: 'Use arrow keys, WASD, swipe, or the D-pad below to steer the snake.', color: '#5cf2c8', btn: 'Start Game' },\n      over: { title: 'GAME OVER', sub: score > 0 && score >= best ? `New best — ${score} points!` : `You scored ${score} points.`, color: '#ff6b8a', btn: 'Play Again' },\n    };\n    const ov = overlays[status] || overlays.ready;\n\n    return {\n      score, best,\n      canvasRef: this.setCanvas,\n      showOverlay: status !== 'playing',\n      overlayTitle: ov.title,\n      overlaySub: ov.sub,\n      overlayColor: ov.color,\n      buttonLabel: ov.btn,\n      start: this.start,\n      levels,\n      padStyle,\n      controlsHint: 'Arrow keys / WASD · Swipe · D-pad',\n      pressUp: () => this.setDir([0,-1]),\n      pressDown: () => this.setDir([0,1]),\n      pressLeft: () => this.setDir([-1,0]),\n      pressRight: () => this.setDir([1,0]),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
